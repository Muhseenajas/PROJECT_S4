{% extends 'core/base.html' %}
{% block title %}Login - RecruitAI{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">
            <h1>Recruit<span>AI</span></h1>
            <p>AI-Powered Recruitment System</p>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter password" required>
            </div>
            {% if form.errors %}
            <div class="alert alert-danger">Invalid username or password.</div>
            {% endif %}
            <button type="submit" class="btn btn-primary" style="width:100%; padding: 0.8rem;">Login</button>
        </form>
        <p style="text-align:center; margin-top:1.5rem; color:#888; font-size:0.9rem;">
            Don't have an account? <a href="{% url 'register' %}" style="color:#e94560; font-weight:600;">Register here</a>
        </p>
    </div>
</div>
{% endblock %}
